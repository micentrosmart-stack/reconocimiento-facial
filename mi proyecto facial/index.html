<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso Go! - Registro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { margin: 0; background-color: #121621; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { position: relative; width: 90%; max-width: 400px; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 2px solid #2a2f3b; }
        video { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .controls { width: 90%; max-width: 400px; padding: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; background: #2a2f3b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background-color: #3498db; }
        #status { font-size: 14px; text-align: center; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="margin-top:0;">Registro de Personal</h3>
        <input type="text" id="personName" placeholder="Nombre completo">
        <input type="text" id="personRole" placeholder="Cargo (ej: CCTV)">
        <button class="btn-blue" onclick="enviarANube()">Guardar Registro</button>
        <div id="status">Esperando cámara...</div>
    </div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

</body>
</html>
